<div class="bar" role="search">
  <div class="bar__search">
    <img
      class="bar__search-icon"
      src="/assets/search-icon.svg"
      alt=""
    />
    <input
      class="bar__input"
      type="search"
      placeholder="Filter by title, author…"
      aria-label="Filter by title or author"
      [(ngModel)]="search"
    />
  </div>

  <label class="bar__sort">
    <!-- only for screenreader -->
    <span class="visually-hidden">Sort articles</span>
    <select
      class="bar__select"
      [(ngModel)]="sort"
    >
      @for (choice of sortDropdownOptions; track choice.value) {
        <option [value]="choice.value">{{ choice.label }}</option>
      }
    </select>
  </label>

  <label class="bar__checkbox">
    <input
      type="checkbox"
      [(ngModel)]="latestOnly"
    />
    <span>Latest only</span>
  </label>
</div>
