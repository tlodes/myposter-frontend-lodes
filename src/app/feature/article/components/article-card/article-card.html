<article class="card">
  <img
    class="card__image"
    [src]="imageUrl()"
    [alt]="article().title"
    loading="lazy"
  />

  <div class="card__body">
    <header class="card__author">
      <span class="card__avatar" aria-hidden="true">{{ initials() }}</span>
      <span class="card__author-meta">
        <span class="card__author-name">{{ article().author }}</span>
        <time class="card__date" [attr.datetime]="article().dateAdded">
          {{ article().dateAdded | date: 'd MMM' }}
        </time>
      </span>
    </header>

    <h2 class="card__title">{{ article().title }}</h2>

    <footer class="card__footer">
      <button
        type="button"
        class="card__like"
        [class.card__like--active]="liked()"
        [attr.aria-pressed]="liked()"
        (click)="toggleLike()"
      >
        Like
      </button>

      <span class="card__likes">
        <svg
          class="card__heart"
          [class.card__heart--active]="liked()"
          viewBox="0 0 24 24"
          width="18"
          height="18"
          aria-hidden="true"
        >
          <path
            d="M12 21s-7.5-4.6-10-9.2C.4 8.6 1.6 4.9 5 4.2 7.1 3.8 9 4.9 12 7.7c3-2.8 4.9-3.9 7-3.5 3.4.7 4.6 4.4 3 7.6C19.5 16.4 12 21 12 21z"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linejoin="round"
          />
        </svg>
        <span class="card__likes-count">{{ likeCount() }}</span> likes
      </span>
    </footer>
  </div>
</article>
