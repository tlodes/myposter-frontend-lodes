<article class="card">
  <img
    class="card__image"
    [src]="imageUrl()"
    [alt]="article().title"
    loading="lazy"
  />

  <div class="card__body">
    <header class="card__author">
      <span class="card__avatar" aria-hidden="true">{{ initials() }}</span>
      <span class="card__author-meta">
        <span class="card__author-name">{{ article().author }}</span>
        <time class="card__date" [attr.datetime]="article().dateAdded">
          {{ publishedDate() | date: 'd MMM' }}
        </time>
      </span>
    </header>

    <h2 class="card__title">{{ article().title }}</h2>

    <footer class="card__footer">
      <button
        type="button"
        class="card__like"
        [class.card__like--active]="liked()"
        [attr.aria-pressed]="liked()"
        (click)="toggleLike()"
      >
        Like
      </button>

      <span class="card__likes">
        <img
          class="card__heart"
          src="/assets/heart-icon.svg"
          alt=""
          width="18"
          height="17"
          aria-hidden="true"
        />
        <span class="card__likes-count">{{ likeCount() }}</span> likes
      </span>
    </footer>
  </div>
</article>
